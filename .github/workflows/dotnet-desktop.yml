name: .NET Desktop Publish

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Package
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore TocBuilder_dotnet-framework.sln

    - name: Build Application
      run: msbuild TocBuilder_dotnet-framework.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Prepare Staging Area
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path release_staging
        Copy-Item bin/Release/*.exe release_staging/
        Copy-Item bin/Release/*.config release_staging/
        Copy-Item bin/Release/*.dll release_staging/
        Get-ChildItem release_staging/

    - name: Package Release Zip
      shell: powershell
      run: |
        Compress-Archive -Path release_staging/* -DestinationPath TocBuilder.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TocBuilder-Windows
        path: TocBuilder.zip

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: TocBuilder.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
